# ===============================
# 활성 프로파일
# ===============================
# local: application-local.properties 를 추가로 로드해 이 파일의 값을 오버라이드
# prod: 운영 배포 시 Docker env_file(.env)의 환경변수로 주입
spring.profiles.active=local
spring.application.name=park302-dashboard

# ===============================
# 데이터소스 (DB 연결)
# ===============================
# ${VAR:기본값} 형식 — 환경변수가 없으면 기본값 사용
# 실제 접속 정보는 .env 또는 application-local.properties 에서 주입
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:park302}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# MySQL 8.x 전용 드라이버 (레거시 com.mysql.jdbc.Driver 사용 금지)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
# validate: 앱 기동 시 엔티티와 실제 DB 스키마가 일치하는지 검증만 수행.
#           테이블 생성/변경을 하지 않으므로 운영 안전. DDL은 직접 관리.
spring.jpa.hibernate.ddl-auto=validate
# MySQL 8.x 방언 — GroupBy 등 ANSI 비호환 쿼리 처리 포함
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# SQL 로그 출력 여부 (application-local.properties 에서 true 로 오버라이드)
spring.jpa.show-sql=false
# show-sql=true 시 SQL을 들여쓰기 포맷으로 출력
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 파일 업로드
# ===============================
# 단건 파일 최대 크기 (초과 시 MaxUploadSizeExceededException → 400 응답)
spring.servlet.multipart.max-file-size=10MB
# 요청 전체 최대 크기 (파일 여러 개 포함 합산)
spring.servlet.multipart.max-request-size=30MB

# ===============================
# 서버
# ===============================
server.port=8060

# ===============================
# JWT 인증
# ===============================
# 서명 키: HS256 기준 256bit(32자) 이상 랜덤 문자열 필수. 운영에서는 반드시 환경변수로 주입.
jwt.secret=${JWT_SECRET}
# 토큰 만료 시간 (밀리초). 기본값 86400000 = 24시간
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# 로깅
# ===============================
# 운영은 INFO, 로컬은 application-local.properties 에서 DEBUG 로 오버라이드
logging.level.com.park302=INFO
